version: '3.8'

services:
  backend:
    container_name: tfg-generador-backend
    build:
      context: ./tfg_backend
      dockerfile: Dockerfile
      args:
        ARG_API_PORT: ${API_PORT}
        ARG_IP_FRONT: ${IP_FRONT}
        ARG_DB_HOST: ${DB_HOST}
        ARG_DB_PORT: ${DB_PORT}
        ARG_DB_USER: ${DB_USER}
        ARG_DB_PASSWORD: ${DB_PASSWORD}
        ARG_DB_NAME: ${DB_NAME}
        ARG_MONGO_AUTH_DB: ${MONGO_AUTH_DB}
        ARG_JWT_SECRET: ${JWT_SECRET}
        ARG_JWT_AUDIENCE: ${JWT_AUDIENCE}
        ARG_JWT_ISSUER: ${JWT_ISSUER}
        ARG_JWT_EXPIRATION: ${JWT_EXPIRATION}
        ARG_APP_NAME: ${APP_NAME}
        ARG_APP_VERSION: ${APP_VERSION}
    environment:
      - API_PORT=${API_PORT}
      - IP_FRONT=${IP_FRONT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_AUTH_DB=${MONGO_AUTH_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - APP_NAME=${APP_NAME}
      - APP_VERSION=${APP_VERSION}
    expose:
      - "5000"
    volumes:
      - ./tfg_backend/plantillas:/app/plantillas
      - ./tfg_backend/data:/app/data
    depends_on:
      - mongo
    networks:
      - dokploy-network
    restart: always

  frontend:
    container_name: tfg-generador-frontend
    build:
      context: ./tfg_frontend
      dockerfile: Dockerfile
      args:
        IP_FRONT: ${IP_FRONT}
        API_HOST: ${API_HOST}
        API_PORT: ${API_PORT}
    environment:
      - IP_FRONT=${IP_FRONT}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: always

  mongo:
    container_name: tfg-generador-mongo
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_AUTH_DB=${MONGO_AUTH_DB}
      - DB_PORT=${DB_PORT}
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    networks:
      - dokploy-network
    restart: always

  # ── Ingress (Nginx reverse proxy + Traefik endpoint) ──────────
  ingress:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/ingress.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    expose:
      - "80"
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # HTTP → HTTPS redirect
      - traefik.http.middlewares.tfg-generador-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.tfg-generador-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.tfg-generador-http.rule=Host(`${DOMAIN:?DOMAIN is required}`)
      - traefik.http.routers.tfg-generador-http.entrypoints=web
      - traefik.http.routers.tfg-generador-http.middlewares=tfg-generador-https-redirect
      # HTTPS
      - traefik.http.routers.tfg-generador.rule=Host(`${DOMAIN:?DOMAIN is required}`)
      - traefik.http.routers.tfg-generador.entrypoints=websecure
      - traefik.http.routers.tfg-generador.tls.certresolver=letsencrypt
      - traefik.http.services.tfg-generador.loadbalancer.server.port=80

volumes:
  mongo-data:

networks:
  dokploy-network:
    external: true
